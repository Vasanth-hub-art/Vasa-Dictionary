<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>

    <style>
        body {
            font-family: Arial;
            background: #121212;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 95%;
            padding: 10px;
            background: #03DAC6;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #00bfa5;
        }

        .error {
            color: red;
        }

        a {
            color: #03DAC6;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>👤 User Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>New user? <a href="/register">Register</a></p>

</div>

</body>
</html>
